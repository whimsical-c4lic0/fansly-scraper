# Auto-create a GitHub Release when a version tag is pushed.
#
# Trigger: pushing a tag matching `v<digit>...` starts the workflow.
# Accepts both PEP 440 forms (`v0.13.7`, `v0.13.7b1`, `v0.13.7rc1`,
# `v0.13.7.dev1`, `v0.13.7.post1`) and SemVer pre-release forms
# (`v0.13.7-rc1`) — the project uses Poetry, which is PEP 440 native.
#
# Body source: the matching `## [VERSION] - DATE` section in CHANGELOG.md.
# Lookup strips the leading `v` from the tag — `v0.13.7b1` → `[0.13.7b1]`.
# Pre-release tags (alpha/beta/rc/dev, in PEP 440 or SemVer shape) are
# flagged as `--prerelease`; `.postN` releases are treated as stable.
#
# GitHub Actions tag filters use shell-style globs (`*`, `?`, `[]`) —
# NOT regex. `+` is literal, not "one or more". The `v[0-9]*` pattern
# below is inclusive on purpose; precise PEP 440 / SemVer shape
# enforcement happens in the workflow body where bash regex works.

name: Release on tag

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  release:
    name: Publish release from CHANGELOG.md
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository at tag
        uses: actions/checkout@v6
        with:
          # Fetch the full history so the changelog at the tagged commit
          # is exactly what shipped; tag-only checkouts can miss the
          # last commit on the branch if the tag lags slightly.
          fetch-depth: 0

      - name: Resolve version from tag
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

          # Pre-release detection — three families:
          #   PEP 440 short:   0.13.7a1, 0.13.7b1, 0.13.7rc1
          #   PEP 440 dev:     0.13.7.dev1
          #   SemVer style:    0.13.7-rc1
          # ``.postN`` is intentionally NOT flagged — PEP 440 post-releases
          # are stable patches of a stable release.
          prerelease=false
          if [[ "${version}" =~ (a|b|rc)[0-9]+$ ]] \
            || [[ "${version}" == *.dev* ]] \
            || [[ "${version}" == *-* ]]; then
            prerelease=true
          fi
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "Resolved tag=${tag} version=${version} prerelease=${prerelease}"

      - name: Extract CHANGELOG.md section
        id: changelog
        run: |
          version="${{ steps.version.outputs.version }}"
          body_file="$(mktemp)"

          # Slice between `## [VERSION]` and the next `## ` heading.
          # The leading heading itself is dropped — GitHub Releases render
          # the version separately in the page title.
          #
          # Use literal-substring comparison via substr() rather than a
          # regex match — `[` and `]` are character-class metacharacters in
          # awk regex, which silently turn "## [0.13.7]" into "match any
          # of 0/./1/3/7" and produce empty output.
          awk -v prefix="## [${version}]" '
            substr($0, 1, length(prefix)) == prefix { in_section = 1; next }
            in_section && /^## / { exit }
            in_section { print }
          ' CHANGELOG.md > "${body_file}"

          if [[ ! -s "${body_file}" ]]; then
            echo "::error::No CHANGELOG.md section found for [${version}]." \
              "Add the release notes under '## [${version}] - <date>' before tagging."
            exit 1
          fi

          # Strip leading/trailing blank lines for a clean release body.
          awk 'NF { found = 1 } found' "${body_file}" \
            | awk '{ lines[NR] = $0 } END {
                last = NR
                while (last > 0 && lines[last] ~ /^[[:space:]]*$/) last--
                for (i = 1; i <= last; i++) print lines[i]
              }' > "${body_file}.trimmed"

          echo "body_file=${body_file}.trimmed" >> "${GITHUB_OUTPUT}"
          echo "--- Release body preview ---"
          cat "${body_file}.trimmed"
          echo "--- end preview ---"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          prerelease_flag=""
          if [[ "${{ steps.version.outputs.prerelease }}" == "true" ]]; then
            prerelease_flag="--prerelease"
          fi

          gh release create "${tag}" \
            --title "${tag}" \
            --notes-file "${{ steps.changelog.outputs.body_file }}" \
            ${prerelease_flag}
